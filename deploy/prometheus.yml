global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    dns_sd_configs:
      - names:
          - 'tasks.cadvisor'
        type: 'A'
        port: 8080

  - job_name: 'node-exporter'
    dns_sd_configs:
      - names:
          - 'tasks.node-exporter'
        type: 'A'
        port: 9100

  - job_name: 'docker-swarm-containers'
    # NUTZT DIE NATIVE SWARM DISCOVERY
    dockerswarm_sd_configs:
      - host: "unix:///var/run/docker.sock"
        role: tasks # Durchsucht die laufenden Tasks (Container) im Swarm
        refresh_interval: 15s

    relabel_configs:
      # 1. NETZWERK-FILTER: Nur Container im richtigen Overlay-Netzwerk zulassen
      - source_labels: [__meta_dockerswarm_network_name]
        regex: 'public-digilab'
        action: keep

      # 2. LABELS PRÜFEN: Nur Container behalten, die das Deploy-Label auf 'true' haben
      - source_labels: [__meta_dockerswarm_service_label_prometheus_scrape]
        regex: 'true'
        action: keep

      # 3. PORT DYNAMISCH ERSETZEN: Nutzt das Port-Label aus dem Deploy-Block (Standard falls leer: 8080)
      - source_labels: [__address__, __meta_dockerswarm_service_label_prometheus_port]
        regex: '(.*):(?:\d+);(\d+)'
        replacement: '$1:$2'
        target_label: __address__

      # 4. APP-NAME: Aus dem Swarm-Label auslesen
      - source_labels: [__meta_dockerswarm_service_label_prometheus_app_name]
        target_label: app_name

      # 5. CONTAINER-NAME: Für eine saubere Anzeige in Grafana setzen
      - source_labels: [__meta_dockerswarm_task_name]
        target_label: container_name
